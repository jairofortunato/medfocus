<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med Estudo Focado</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Med Estudo Focado</h1>
            <p class="subtitle">Questoes com Explicacao por IA</p>

            <!-- Header Tabs -->
            <div class="header-tabs">
                <button class="tab-btn active" onclick="switchTab('timer')">Timer</button>
                <button class="tab-btn" onclick="switchTab('stats')">Estatística</button>
            </div>

            <!-- Tab Content: Timer -->
            <div id="tab-timer" class="tab-content active">
                <div class="timer-container">
                    <div class="timer-display" id="timerDisplay">25:00</div>
                    <div class="timer-controls">
                        <button class="timer-btn" id="startBtn" onclick="startTimer()">Iniciar</button>
                        <button class="timer-btn" id="pauseBtn" onclick="pauseTimer()"
                            style="display: none;">Pausar</button>
                        <button class="timer-btn secondary" id="resetBtn" onclick="resetTimer()">Reiniciar</button>
                    </div>
                </div>
            </div>

            <!-- Tab Content: Statistics -->
            <div id="tab-stats" class="tab-content" style="display: none;">
                <div class="stats-detailed-container">
                    <div class="stats-header">
                        <span>Área</span>
                        <span>Questões</span>
                        <span>Acertos</span>
                        <span>%</span>
                    </div>
                    <div id="tagStatsList" class="stats-list">
                        <!-- Stats will be populated by JS -->
                    </div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            <div class="stats-container">
                <p class="progress-text"><span id="answered">0</span> de <span id="total">100</span> questoes
                    respondidas</p>
                <p class="correct-count"><span id="correctCount">0</span> acertos</p>
            </div>
        </header>

        <div class="navigation">
            <button id="prevBtn" onclick="prevQuestion()" disabled>Anterior</button>
            <select id="questionSelect" onchange="goToQuestion(this.value)"></select>
            <button id="nextBtn" onclick="nextQuestion()">Proxima</button>
        </div>

        <main id="questionContainer">
            <!-- Questions will be loaded here -->
        </main>

        <div id="explanationModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">[x]</span>
                <div id="explanationContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Analisando...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>

</html>
